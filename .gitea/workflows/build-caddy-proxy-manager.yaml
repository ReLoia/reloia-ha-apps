name: Build Caddy Proxy Manager

on:
  push:
    branches:
      - master
    paths:
      - ".gitea/workflows/build-caddy-proxy-manager.yaml"
      - ".addons.yml"
      - "repository.yaml"
      - "caddy-proxy-manager/**"
  workflow_dispatch:

env:
  REGISTRY: git.reloia.uk
  IMAGE_NAME: git.reloia.uk/reloia/caddy-proxy-manager

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract add-on version
        id: version
        run: |
          version="$(sed -n 's/^version: \"\\(.*\\)\"/\\1/p' caddy-proxy-manager/config.yaml)"
          if [ -z "$version" ]; then
            echo "Failed to extract version from config.yaml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./caddy-proxy-manager
          file: ./caddy-proxy-manager/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
